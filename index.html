<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roma — Mapa Cultural</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --terracotta: #8B3A2A;
    --gold: #C4922A;
    --cream: #F5EFE0;
    --dark: #1A1208;
    --ink: #2C1F0E;
    --sand: #DDD0B3;
    --moss: #5C6B3A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--dark);
    color: var(--cream);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    background: var(--ink);
    border-bottom: 1px solid var(--gold);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 18px;
    z-index: 1000;
    flex-shrink: 0;
  }
  .header-ornament { color: var(--gold); font-size: 22px; line-height: 1; }
  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--cream);
  }
  header p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--sand);
    letter-spacing: 0.05em;
    margin-top: 1px;
  }
  .header-text { flex: 1; }
  .pin-count {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.1em;
    background: rgba(196,146,42,0.12);
    border: 1px solid rgba(196,146,42,0.3);
    padding: 4px 12px;
    border-radius: 2px;
  }
  #map { flex: 1; width: 100%; z-index: 1; }

  /* ── Popup ── */
  .leaflet-popup-content-wrapper {
    background: var(--ink);
    border: 1px solid var(--gold);
    border-radius: 6px;
    box-shadow: 0 10px 50px rgba(0,0,0,0.65);
    padding: 0;
    max-width: 360px;
    min-width: 300px;
    overflow: hidden;
  }
  .leaflet-popup-tip { background: var(--gold); }
  .leaflet-popup-close-button {
    color: white !important;
    font-size: 20px !important;
    top: 6px !important;
    right: 8px !important;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    z-index: 10;
  }
  .leaflet-popup-close-button:hover { color: var(--gold) !important; }
  .leaflet-popup-content { margin: 0 !important; width: 100% !important; }

  .popup-img-wrap {
    width: 100%;
    height: 190px;
    overflow: hidden;
    position: relative;
    background: #0e0a04;
  }
  .popup-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    display: block;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .popup-img-wrap img.loaded { opacity: 1; }
  .popup-img-skeleton {
    position: absolute;
    inset: 0;
    background: linear-gradient(110deg, #1a1208 30%, #2c1f0e 50%, #1a1208 70%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .popup-img-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(15,8,2,0.88));
    padding: 22px 14px 8px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    color: rgba(245,239,224,0.85);
    letter-spacing: 0.03em;
  }

  .popup-inner { padding: 14px 17px 16px; }
  .popup-category {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .popup-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--cream);
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .popup-divider {
    height: 1px;
    background: linear-gradient(to right, var(--gold), transparent);
    margin-bottom: 10px;
  }
  .popup-artist {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 9px;
  }
  .popup-artist-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
    flex-shrink: 0;
    margin-top: 2px;
    min-width: 56px;
  }
  .popup-artist-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--sand);
    line-height: 1.4;
  }
  .popup-works-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .popup-works {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px;
    color: var(--cream);
    line-height: 1.6;
    font-weight: 300;
  }
  .popup-works li {
    list-style: none;
    padding-left: 13px;
    position: relative;
    margin-bottom: 2px;
  }
  .popup-works li::before {
    content: '◆';
    position: absolute;
    left: 0;
    color: var(--terracotta);
    font-size: 6px;
    top: 5px;
  }
  .popup-desc {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11.5px;
    color: var(--sand);
    line-height: 1.6;
    font-weight: 300;
    margin-top: 9px;
    padding-top: 9px;
    border-top: 1px solid rgba(196,146,42,0.2);
    font-style: italic;
  }

  /* ── Legend ── */
  .legend {
    background: rgba(26,18,8,0.92);
    border: 1px solid rgba(196,146,42,0.4);
    padding: 11px 15px;
    border-radius: 4px;
    backdrop-filter: blur(8px);
  }
  .legend-title {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 4px;
    font-size: 11px;
    color: var(--sand);
    font-family: 'Source Sans 3', sans-serif;
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .ld-museu     { background: #8B3A2A; }
  .ld-monumento { background: #4A6741; }
  .ld-parque    { background: #5C6B3A; }
  .ld-igreja    { background: #2A4A7A; }
  .ld-bairro    { background: #7A5A2A; }
  .ld-comercio  { background: #5A2A6A; }

  /* ── Layer control ── */
  .leaflet-control-layers {
    background: rgba(26,18,8,0.92) !important;
    border: 1px solid rgba(196,146,42,0.5) !important;
    border-radius: 4px !important;
    font-family: 'Source Sans 3', sans-serif !important;
    font-size: 12px !important;
    backdrop-filter: blur(8px);
  }
  .leaflet-control-layers-expanded { padding: 10px 14px !important; }
  .leaflet-control-layers label { color: var(--sand) !important; margin-bottom: 4px !important; display: block; }
  .leaflet-control-layers input { accent-color: var(--gold); margin-right: 6px; }
  .leaflet-bar a {
    background: var(--ink) !important;
    color: var(--cream) !important;
    border-color: rgba(196,146,42,0.4) !important;
  }
  .leaflet-bar a:hover { background: var(--terracotta) !important; }
  .leaflet-control-attribution {
    background: rgba(26,18,8,0.7) !important;
    color: var(--sand) !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: var(--gold) !important; }

  @media (max-width: 600px) {
    header h1 { font-size: 15px; }
    .pin-count { display: none; }
    .legend { display: none; }
    .leaflet-popup-content-wrapper { max-width: 290px; min-width: 260px; }
    .popup-img-wrap { height: 150px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-ornament">⚱</div>
  <div class="header-text">
    <h1>ROMA — MAPA CULTURAL</h1>
    <p>Arte, Arquitetura &amp; Patrimônio da Cidade Eterna</p>
  </div>
  <div class="pin-count">31 LOCAIS</div>
</header>

<div id="map"></div>

<script>
const map = L.map('map', { center: [41.898, 12.479], zoom: 14, zoomControl: true });

const osmStandard = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19
});
const osmHot = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> | HOT',
  subdomains: 'abc', maxZoom: 19
});
const cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  subdomains: 'abcd', maxZoom: 19
});
const cartoDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_matter/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  subdomains: 'abcd', maxZoom: 19
});

osmStandard.addTo(map);
L.control.layers({
  "🗺️ OpenStreetMap": osmStandard,
  "🎨 OSM Humanitário": osmHot,
  "☀️ Carto Voyager": cartoLight,
  "🌙 Carto Dark": cartoDark,
}, null, { position: 'topright', collapsed: false }).addTo(map);

/* marker factory */
const catColors = {
  museu:    { fill: '#8B3A2A', stroke: '#E05A42' },
  monumento:{ fill: '#4A6741', stroke: '#6A9461' },
  parque:   { fill: '#5C6B3A', stroke: '#7A9050' },
  igreja:   { fill: '#2A4A7A', stroke: '#4470B8' },
  bairro:   { fill: '#7A5A2A', stroke: '#C4922A' },
  comercio: { fill: '#5A2A6A', stroke: '#9050A8' },
};

function makeIcon(cat) {
  const c = catColors[cat] || catColors.museu;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 44" width="32" height="44">
    <path d="M16 0C7.16 0 0 7.16 0 16c0 11.84 16 28 16 28s16-16.16 16-28C32 7.16 24.84 0 16 0z"
      fill="${c.fill}" stroke="${c.stroke}" stroke-width="1.5"/>
    <circle cx="16" cy="16" r="6" fill="rgba(10,4,0,0.55)"/>
  </svg>`;
  return L.divIcon({ html: svg, iconSize:[32,44], iconAnchor:[16,44], popupAnchor:[0,-46], className:'' });
}

/* popup builder with image */
function buildPopup(o) {
  const works = o.works.map(w => `<li>${w}</li>`).join('');
  return `
  <div class="popup-img-wrap">
    <div class="popup-img-skeleton" id="skel_${o.id}"></div>
    <img src="${o.img}" alt="${o.imgCaption}"
         onload="this.classList.add('loaded'); const s=document.getElementById('skel_${o.id}'); if(s) s.style.display='none';"
         onerror="this.parentElement.style.display='none'">
    <div class="popup-img-caption">${o.imgCaption}</div>
  </div>
  <div class="popup-inner">
    <div class="popup-category">${o.cat_label}</div>
    <div class="popup-title">${o.title}</div>
    <div class="popup-divider"></div>
    <div class="popup-artist">
      <span class="popup-artist-label">Artista / Arq.</span>
      <span class="popup-artist-name">${o.artists}</span>
    </div>
    <div class="popup-works-label">Obras em Destaque</div>
    <ul class="popup-works">${works}</ul>
    <div class="popup-desc">${o.desc}</div>
  </div>`;
}

/* ── location data ── */
const locations = [
  {
    id:'l01', lat: 41.9064878, lng: 12.4536413,
    cat: 'museu', cat_label: 'Museu · Vaticano',
    title: 'Museus do Vaticano & Capela Sistina',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Michelangelo_-_Creation_of_Adam_%28cropped%29.jpg/800px-Michelangelo_-_Creation_of_Adam_%28cropped%29.jpg',
    imgCaption: 'A Criação de Adão — Michelangelo, 1511 (detalhe)',
    artists: 'Michelangelo, Rafael Sanzio, Laocoonte (escultura helenística)',
    works: [
      'Teto da Capela Sistina — Michelangelo (1508–1512)',
      'O Juízo Final — Michelangelo (1536–1541)',
      'Escola de Atenas — Rafael (Salas de Rafael)',
      'Laocoonte e seus filhos — escultura helenística, séc. I a.C.',
    ],
    desc: 'O maior complexo museológico do mundo com 70.000 obras. A Criação de Adão é o fresco mais famoso da humanidade — pintada por Michelangelo deitado em andaimes ao longo de 4 anos.'
  },
  {
    id:'l02', lat: 41.8986108, lng: 12.4768729,
    cat: 'monumento', cat_label: 'Monumento · Roma Antiga',
    title: 'Panteão',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Pantheon_Rome_2005.jpg/800px-Pantheon_Rome_2005.jpg',
    imgCaption: 'O Panteão de Roma — 118–125 d.C.',
    artists: 'Adriano (reconstrução, 118–125 d.C.) — Engenharia romana imperial',
    works: [
      'Cúpula de concreto romano — diâmetro de 43,3 m, recorde por séculos',
      'Óculo central — abertura de 9 m, única fonte de luz',
      'Túmulo de Rafael Sanzio',
      'Túmulos dos Reis da Itália (Vítor Emanuel II e Umberto I)',
    ],
    desc: 'O edifício antigo mais bem preservado do mundo. Sua cúpula sem armação ainda é a maior do tipo depois de 19 séculos. O óculo é um tour de force: a chuva que entra escoa por orifícios invisíveis no piso de mármore.'
  },
  {
    id:'l03', lat: 41.9142103, lng: 12.4921442,
    cat: 'museu', cat_label: 'Galeria · Barroco',
    title: 'Galeria Borghese',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Gian_Lorenzo_Bernini_-_Apollo_and_Daphne_-_Galleria_Borghese.jpg/600px-Gian_Lorenzo_Bernini_-_Apollo_and_Daphne_-_Galleria_Borghese.jpg',
    imgCaption: 'Apolo e Dafne — Bernini, c.1622–25',
    artists: 'Gian Lorenzo Bernini, Caravaggio, Antonio Canova, Rafael',
    works: [
      'Apolo e Dafne — Bernini (c.1622–25): mármore em movimento',

      'Paulina Bonaparte como Vênus Vitrix — Canova (1805–08)',
      'A Deposição — Rafael (1507)',
    ],
    desc: 'A "Rainha das coleções privadas do mundo". Bernini monopoliza o térreo com esculturas que desafiam a fisicalidade do mármore. Visitas limitadas a 2h — reserve com antecedência.'
  },
  {
    id:'l04', lat: 41.9082914, lng: 12.482623,
    cat: 'museu', cat_label: 'Villa · Museu · Renascimento',
    title: 'Vila Médici',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Villa_Medici_Rome.jpg/800px-Villa_Medici_Rome.jpg',
    imgCaption: 'Villa Medici — Annibale Lippi, 1564',
    artists: 'Annibale Lippi (arquitetura, 1564); sede da Académie de France à Rome',
    works: [
      'Fachada com relevos antigos embutidos — frisos e estátuas greco-romanas',
      'Jardins formais renascentistas com perspectiva axial',

    ],
    desc: 'Adquirida pelo Cardeal Fernando de Médici em 1576, é sede da Académie de France à Rome desde Luís XIV. Compositores como Berlioz e Debussy aqui residiram como pensionistas do Estado francês.'
  },
  {
    id:'l05', lat: 41.8902102, lng: 12.4922309,
    cat: 'monumento', cat_label: 'Monumento · Roma Antiga',
    title: 'Coliseu',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/de/Colosseo_2020.jpg/800px-Colosseo_2020.jpg',
    imgCaption: 'Anfiteatro Flaviano (Coliseu) — 72–80 d.C.',
    artists: 'Engenharia romana imperial — dinastia Flaviana (72–80 d.C.)',
    works: [
      'Três ordens clássicas sobrepostas: dórica, jônica, coríntia',
      'Sistema de arcadas e abóbadas em concreto romano',
      'Hipogeu — labirinto subterrâneo com elevadores para gladiadores e animais',
    ],
    desc: 'O maior anfiteatro já construído (50.000 espectadores). Símbolo máximo da engenharia romana, utilizado por quatro séculos. "Enquanto o Coliseu existir, Roma existirá" — monge Bede, séc. VIII.'
  },
  {
    id:'l06', lat: 41.8920906, lng: 12.4864378,
    cat: 'monumento', cat_label: 'Sítio Arqueológico · Roma Antiga',
    title: 'Foro Romano',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Forum_romanum_6k_%285765117275%29.jpg/800px-Forum_romanum_6k_%285765117275%29.jpg',
    imgCaption: 'Foro Romano visto do Monte Palatino',

      'Basílica de Maxêncio (312 d.C.)',
    ],
    desc: 'O centro político, religioso e comercial da Roma Antiga por mais de mil anos. Um livro aberto da História: cada pedra sobrepõe repúblicas, impérios e medievalidade em camadas arqueológicas.'
  },
  {
    id:'l07', lat: 41.894891, lng: 12.482954,
    cat: 'monumento', cat_label: 'Monumento · Séc. XIX–XX',
    title: 'Monumento Vittorio Emanuelle II',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/03/Vittoriano_di_notte.jpg/800px-Vittoriano_di_notte.jpg',
    imgCaption: 'Vittoriano (Altare della Patria) iluminado à noite',
    artists: 'Giuseppe Sacconi (projeto, 1885); Angelo Zanelli (esculturas do altar)',

      'Estátua equestre de Vítor Emanuel II — Angelo Zanelli (1911)',

    ],
    desc: 'Apelidado de "bolo de noiva" pelos romanos, construído em mármore branco de Botticino. Seu tamanho perturbou o tecido medieval do entorno mas oferece um dos melhores miradores da cidade.'
  },
  {
    id:'l08', lat: 41.903358, lng: 12.489826,
    cat: 'museu', cat_label: 'Palácio-Museu · Barroco',
    title: 'Palazzo Barberini',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Raphael_-_La_fornarina.jpg/520px-Raphael_-_La_fornarina.jpg',
    imgCaption: 'La Fornarina — Rafael, c.1519–20',

    works: [
      'La Fornarina — Rafael (c.1519–20): retrato da amante do pintor',

      'Enrique VIII — Hans Holbein o Jovem (c.1540)',
      'Escada helicoidal — Borromini; Escada retangular — Bernini',
      'Afresco do teto Gran Salone — Pietro da Cortona (1633–39)',
    ],
    desc: 'Palácio barroco dos Barberini (emblema: abelha). A rivalidade entre Bernini e Borromini está embutida no edifício — cada um projetou uma das duas escadarias.'
  },
  {
    id:'l09', lat: 41.8979782, lng: 12.4815742,
    cat: 'museu', cat_label: 'Palácio-Galeria · Barroco',
    title: 'Galeria Doria Pamphilj',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Velazquez-inocentius_X.jpg/520px-Velazquez-inocentius_X.jpg',
    imgCaption: 'Retrato do Papa Inocêncio X — Velázquez, c.1650',
    artists: 'Caravaggio, Velázquez, Tiziano, Claude Lorrain',
    works: [
      'Retrato do Papa Inocêncio X — Velázquez (c.1650): "Troppo vero" — disse o pontífice',
      'Descanso na Fuga para o Egito — Caravaggio (c.1595)',
      'Magdalena Penitente — Caravaggio (c.1595)',
      'Salão dos Espelhos — galeria privada do séc. XVII',
    ],
    desc: 'Única galeria nobre de Roma ainda em posse da família original. O audioguia é narrado por um descendente dos Pamphilj. Velázquez retratou o pontífice com tal brutalidade psicológica que ele disse: "Troppo vero".'
  },
  {
    id:'l10', lat: 41.9282451, lng: 12.4668557,
    cat: 'museu', cat_label: 'Museu · Arte Contemporânea',
    title: 'MAXXI Museum',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/MAXXI_-_Museo_Nazionale_delle_Arti_del_XXI_secolo%2C_Rome_%282012%29.jpg/800px-MAXXI_-_Museo_Nazionale_delle_Arti_del_XXI_secolo%2C_Rome_%282012%29.jpg',
    imgCaption: 'MAXXI — Zaha Hadid, inaugurado em 2009',
    artists: 'Zaha Hadid (arquitetura, 2009)',
    works: [

locations.forEach(loc => {
  const icon = makeIcon(loc.cat);
  const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(map);
  marker.bindPopup(buildPopup(loc), { maxWidth: 360, className: 'roma-popup' });
});

  return div;

legend.addTo(map);
</script>
