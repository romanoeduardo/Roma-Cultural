<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Cultural de Roma</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&family=Cinzel:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: #f9e7d7;
            color: #5c3a3a;
        }
        h1, h2, h3 {
            color: #7c4e3a;
        }
        .popup {
            width: 300px;
        }
        .leaflet-control-attribution {
            display: none; /* Hide attribution control */
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
    <h1>Mapa Cultural de Roma</h1>
    <div id="map" style="height: 600px;"></div>
    <script>
        var map = L.map('map').setView([41.9028, 12.4964], 13);

        // Base layers
        var OpenStreetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        var OSMHumanitarian = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
            maxZoom: 19
        });

        var CartoVoyager = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        });

        var CartoDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        });

        // Add additional layers
        var layersControl = L.control.layers({
            "OpenStreetMap": OpenStreetMap,
            "OSM Humanitarian": OSMHumanitarian,
            "Carto Voyager": CartoVoyager,
            "Carto Dark": CartoDark,
        }).addTo(map);

        var culturalLocations = [
            // List of cultural locations with details
            {
                "name": "Coliseu",
                "lat": 41.8902,
                "lng": 12.4922,
                "description": "O Coliseu, um dos mais imponentes monumentos do mundo, é um anfiteatro romano que data do século I d.C.",
                "image": "coliseu.jpg",
                "artist": "Arquiteto: Vespasiano",
            },
            {
                "name": "Vaticano",
                "lat": 41.9029,
                "lng": 12.4534,
                "description": "O coração da Igreja Católica e a residência do Papa. É famoso por sua arquitetura e arte impressionante.",
                "image": "vaticano.jpg",
                "artist": "Mestre: Michelangelo",
            },
            // More locations...
        ];

        culturalLocations.forEach(function(location) {
            var popupContent = `<div class='popup'><h3>${location.name}</h3><img src='${location.image}' width='100%' /><p>${location.description}</p><p>${location.artist}</p></div>`;
            var marker = L.marker([location.lat, location.lng]).addTo(map);
            marker.bindPopup(popupContent);
        });
    </script>
</body>
</html>
